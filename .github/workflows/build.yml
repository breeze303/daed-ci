name: Build daed Source Package

on:
  workflow_dispatch:
    inputs:
      pkg_version:
        description: '临时测试版本号 (留空则默认使用下方的固定版本号)'
        required: false
  schedule:
    - cron: "*/30 * * * *"

env:
  # ⭐ 请在这里手动修改你的固定版本号 ⭐
  FIXED_PKG_VERSION: '2026.02.27'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🧰 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 🛠️ Run Pre-build Script
        run: |
          ROOT_DIR="$(pwd)"
          WORK_DIR="$ROOT_DIR/daed_build_temp"
          
          # 读取版本号：优先使用手动触发时输入的临时版本号；如果是定时自动触发或未输入，则使用顶部的固定版本号
          PKG_VERSION="${{ github.event.inputs.pkg_version }}"
          if [ -z "$PKG_VERSION" ]; then
            PKG_VERSION="${{ env.FIXED_PKG_VERSION }}"
          fi

          echo ">>> [1/6] 创建并进入工作区..."
          mkdir -p "$WORK_DIR" && cd "$WORK_DIR"

          echo ">>> [2/6] 拉取主线框架与优化分支..."
          git clone --depth 1 https://github.com/daeuniverse/daed.git .
          rm -rf wing dae-core outbound quic-go
          git clone --depth 1 https://github.com/daeuniverse/dae-wing wing
          
          # 包含子模块的完整拉取
          git clone --depth 1 -b optimize/code-quality-fixes https://github.com/olicesx/dae dae-core
          cd dae-core && git submodule update --init --recursive && cd ..
          
          git clone --depth 1 -b fix/direct-memory-safety https://github.com/olicesx/outbound outbound
          git clone --depth 1 -b main https://github.com/olicesx/quic-go quic-go

          echo ">>> [3/6] 🩺 修复 dae-lsp 的源码构建缺陷..."
          # 修复 1：提前建好空文件，解决 pnpm install 找不到 dist/server.cjs 导致 symlink 报错的问题
          mkdir -p packages/dae-lsp/dist
          touch packages/dae-lsp/dist/server.cjs
          
          # 修复 2：将 dae-lsp 的 build 脚本容错化，让 tsdown 的 strict ERROR 变为 non-fatal（不阻断构建流程）
          sed -i 's/"build": "tsdown"/"build": "tsdown || true"/g' packages/dae-lsp/package.json

          echo ">>> [4/6] 前端构建与静态资源压缩..."
          pnpm install --no-frozen-lockfile --ignore-scripts
          
          # 🌟 去掉了强行绕过参数，恢复为最纯净的官方全量优雅构建
          npx turbo run build --filter daed
          
          echo ">>> 部署静态资源到后端..."
          mkdir -p wing/webrender/web
          cp -rf apps/web/dist/* wing/webrender/web/
          find wing/webrender/web -type f -size +4k ! -name "*.gz" -exec gzip -9 -k {} \;

          echo ">>> [5/6] 降级 Go 依赖版本防报错..."
          find . -name "go.mod" -exec sed -i 's/^go 1.*/go 1.23.0/g' {} \;
          find . -name "go.mod" -exec sed -i '/^toolchain/d' {} \;

          echo ">>> [6/6] 缝合 Go 语言依赖树..."
          cd wing
          go mod edit -replace github.com/daeuniverse/dae=../dae-core
          go mod edit -replace github.com/daeuniverse/outbound=../outbound
          go mod edit -replace github.com/daeuniverse/quic-go=../quic-go
          
          GOPROXY="https://goproxy.cn,direct" GOSUMDB=off go mod tidy
          cd ..

          echo ">>> 打包最终源码产物..."
          tar -czf "$ROOT_DIR/daed-$PKG_VERSION.tar.gz" wing dae-core outbound quic-go
          echo "打包完成：daed-$PKG_VERSION.tar.gz"

      - name: 🚀 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-source-package
          path: daed-*.tar.gz
          retention-days: 7

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-source-latest
          name: "daed"
          body: "包含前端静态资源与 olicesx 优化版核心的预构建源码包。"
          files: daed-*.tar.gz
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
